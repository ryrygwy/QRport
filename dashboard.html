<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fixora | Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <span>FIXORA</span>
    <a href="index.html">Log Out</a>
  </nav>

  <main class="dashboard">
    <h2>Main Dashboard</h2>
    <p class="subtitle">Streamlining facility reporting.</p>

    <div class="cards-vertical">
      <a href="submit-issue.html" class="card-link">
        <div class="card">
          <span style="font-size: 2rem;">➕</span>
          <div>
            <h3>Submit Issue</h3>
            <p>Log a new lab or facility defect.</p>
          </div>
        </div>
      </a>

      <a href="reported-issues.html" class="card-link">
        <div class="card">
          <span style="font-size: 2rem;">📋</span>
          <div>
            <h3>Reported Issues</h3>
            <p>View the history of all facility logs.</p>
          </div>
        </div>
      </a>

      <a href="issues-status.html" class="card-link">
        <div class="card">
          <span style="font-size: 2rem;">✅</span>
          <div>
            <h3>Issue Status</h3>
            <p>Track the progress of active repairs.</p>
          </div>
        </div>
      </a>
    </div>
  </main>
</body>
</html>
