<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Fixora | Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top Navigation -->
  <nav class="navbar">
    <span>Fixora</span>
    <a href="index.html">Log Out</a>
  </nav>

  <!-- Dashboard Main -->
  <main class="dashboard">
    <h2>Welcome back</h2>
    <p class="subtitle">
      Track, manage, and resolve campus issues efficiently.
    </p>

    <!-- Dashboard Cards -->
    <div class="cards">
      <div class="card">
        <h3>📋 Reported Issues</h3>
        <p>View all submitted maintenance requests across campus.</p>
      </div>

      <div class="card">
        <h3>➕ Submit Issue</h3>
        <p>Log a new issue with location and description.</p>
      </div>

      <div class="card">
        <h3>✅ Issue Status</h3>
        <p>Monitor progress from pending to resolved.</p>
      </div>
    </div>
  </main>

</body>
</html>
