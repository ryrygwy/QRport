<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>QRPort | Reporter Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">
  <nav class="navbar">
    <div class="nav-brand">
      <img src="logo.png" alt="QRPort Logo" class="nav-logo">
      <span>QRPort</span>
    </div>
    <a href="index.html">Home</a>
  </nav>

  <main class="dashboard">
    <div class="dashboard-header">
      <h2>Reporter Portal</h2>
      <p class="subtitle">Submit a facility issue and check ticket progress.</p>
    </div>

    <div class="dashboard-vertical">
      <a href="submit-issue.html" class="card-link">
        <div class="card vertical-row">
          <span class="icon">QR</span>
          <div class="card-content">
            <h3>Report an Issue</h3>
            <p>Use the QR-style form to log a campus facility concern.</p>
          </div>
        </div>
      </a>

      <a href="user-status.html" class="card-link">
        <div class="card vertical-row">
          <span class="icon">OK</span>
          <div class="card-content">
            <h3>Check Status</h3>
            <p>View ticket progress without admin controls.</p>
          </div>
        </div>
      </a>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 QRPort. All rights reserved.</p>
  </footer>
</body>
</html>
