<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fixora | Issue Status</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <span>FIXORA</span>
    <a href="dashboard.html">Dashboard</a>
  </nav>

  <main class="dashboard">
    <h2>Active Status</h2>
    <p class="subtitle">Real-time progress of your tickets.</p>
    <div id="statusList"></div>
  </main>

  <script>
    const issues = JSON.parse(localStorage.getItem('fixora_data') || '[]');
    const container = document.getElementById('statusList');

    if(issues.length === 0) {
      container.innerHTML = "<p style='text-align:center; opacity:0.6;'>No active tickets found.</p>";
    } else {
      issues.forEach(item => {
        container.innerHTML += `
          <div class="issue-item">
            <strong>${item.location} (Ticket ${item.ticket})</strong>
            <p style="font-size:0.9rem; margin: 5px 0;">${item.description}</p>
            <span class="status-badge">${item.status}</span>
          </div>
        `;
      });
    }
  </script>
</body>
</html>
