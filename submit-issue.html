<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixora | Submit Issue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page"> <nav class="navbar">
    <div class="nav-brand">
      <img src="logo.png" alt="Fixora Logo" class="nav-logo">
      <span>FIXORA</span>
    </div>
    <a href="dashboard.html">Back to Dashboard</a>
  </nav>

  <main class="dashboard">
    <div class="login-card report-card"> <h2 style="color: #fff; margin-bottom: 10px;">Report an Issue</h2>
      <p style="color: #ccc; margin-bottom: 25px;">Enter details to log a defect for STI Dasmariñas</p>
      
      <form id="issueForm" class="form-left">
          <label style="display: block; text-align: left; margin-bottom: 5px; color: #fff;">Location</label>
          <input type="text" id="location" placeholder="e.g., Classroom 204" required>
          
          <label style="display: block; text-align: left; margin-bottom: 5px; color: #fff; margin-top: 15px;">Description</label>
          <textarea id="description" placeholder="Describe the issue..." rows="5" required></textarea>
          
          <button type="submit" class="submit-btn">Submit Issue</button>
      </form>

      <div style="margin-top: 25px;">
        <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>© 2026 Fixora. All rights reserved.</p>
  </footer>

  <script>
    document.getElementById('issueForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      let existingData = JSON.parse(localStorage.getItem('fixora_data') || '[]');
      
      // Sequential logic: ID is simply current count + 1
      const nextTicketNumber = existingData.length + 1;

      const newReport = {
        ticket: "#" + nextTicketNumber,
        location: document.getElementById('location').value,
        description: document.getElementById('description').value,
        date: new Date().toLocaleDateString(),
        status: 'Pending'
      };

      existingData.unshift(newReport);
      localStorage.setItem('fixora_data', JSON.stringify(existingData));

      alert("Ticket " + newReport.ticket + " submitted successfully!");
      window.location.href = "dashboard.html";
    });

  </script>
</body>
</html>
